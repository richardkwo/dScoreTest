  - compare_models
  - compare_models.glm
  - compare_models.lm
  - compare_models.gam
- title: Engine and methods
  desc: The underlying debiased score test and its S3 methods.
  contents:
  - dScoreTest
  - new_dScoreTest
  - print.dScoreTest
  - plot.dScoreTest
  - summary.dScoreTest
- title: Hunt algorithms
  desc: Routines that hunt for a direction of misspecification.
  contents:
  - hunt_optimal
  - hunt_wls
  - hunt_vanilla
- title: Package
  contents:
  - dScoreTest-package
